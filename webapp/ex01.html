<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>javascript</h1>
	<h2>basic data type</h2>
</body>
	<script type="text/javascript">
		console.log("타입확인");
		
		console.log(typeof 1);
		console.log(typeof '한');
		console.log(typeof '한한');
		console.log(typeof "힌한");
		console.log(typeof (5<54));
		console.log(typeof (5>54));
	</script>
	<script type="text/javascript">
		console.log("number 형 확인");
		
		console.log(13+5);
		console.log(13-5);
		console.log(13*5);
		console.log(13/5);
		console.log(13%5);
		console.log(13+5.2);
		console.log(5+3*2);
		console.log((5+3)*2);
	</script>
	<script type="text/javascript">
		console.log("string 형 확인");
		
		console.log("동해물과 '백두산'이");
		console.log('동해물과 "백두산"이');
		console.log('동해물과 \'백두산\'이');
		console.log("동해물과 \"백두산\"이");
		console.log("동해물과 \n백두산이");
		console.log("동해물과 \t백두산이");
		
		console.log("동해물과" + "1234" + "백두산이");
	</script>
	<script type="text/javascript">
		console.log(5>54);
		console.log(5<54);
	</script>
</html>
