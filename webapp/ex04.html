<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>javascript</h1>
	<h2>구구단</h2>
</body>
	<script type="text/javascript">
		for(var i=2;i<10;i++) {
			document.write("&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;")
			for(var j=1;j<10;j++) {
				document.write("&nbsp;" + i + " * "+ j+ " = " + j*i + "&nbsp;");
			}
			document.write("<br>")
		}
	</script>
</html>
